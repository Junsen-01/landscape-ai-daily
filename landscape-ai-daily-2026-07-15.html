<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>景观行业 AI 日报 · 2026-07-15 | 源説研究社</title>
<style>

:root {
  --paper:#faf6f0; --card:#ffffff; --card-h:#f5f0e8;
  --green:#1a3a2a; --green-l:#2d6a4f; --green-ll:#5a9a7a;
  --terra:#b85c3a; --terra-l:#d4a574; --sand:#c8a96e;
  --t1:#1a2e1a; --t2:#3a5a3a; --t3:#7a9a7a;
  --br:rgba(26,58,42,.12); --br-g:rgba(26,58,42,.30);
  --rc:14px;
  --sd:0 4px 24px rgba(26,58,42,.08),0 1px 4px rgba(0,0,0,.06);
  --sdh:0 12px 48px rgba(26,58,42,.15),0 4px 12px rgba(0,0,0,.08);
  --ff:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
  --fm:"SF Mono","Fira Code",Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--paper);color:var(--t1);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(200,169,110,.08) 0%,transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(184,92,58,.05) 0%,transparent 70%)}

.hero{position:relative;padding:56px 24px 48px;text-align:center;overflow:hidden;
  background:linear-gradient(135deg,#faf6f0 0%,#efe8d8 30%,#e8dfc8 60%,#faf6f0 100%);
  border-bottom:3px solid;border-image:linear-gradient(90deg,#2d6a4f,#b85c3a,#d4a574,#2d6a4f) 1}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(45,106,79,.12) 0%,transparent 65%),
    radial-gradient(ellipse 40% 30% at 80% 100%,rgba(184,92,58,.08) 0%,transparent 60%);
  pointer-events:none}

  .brand-top{text-align:center;margin-bottom:18px}
  .brand-capsule{display:inline-flex;align-items:center;gap:8px;
    background:linear-gradient(135deg,rgba(26,58,42,.06),rgba(184,92,58,.04));
    border:1.5px solid rgba(26,58,42,.16);border-radius:100px;
    padding:6px 22px}
  .brand-icon{width:24px;height:24px;border-radius:50%;
    background:linear-gradient(135deg,var(--green),var(--green-l));
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:11px;font-weight:800}
  .brand-name{font-size:14px;font-weight:700;letter-spacing:.12em;
    color:var(--green)}
  .brand-slogan{font-size:11.5px;color:var(--terra);margin-top:4px;font-weight:500;letter-spacing:.06em}

.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,rgba(45,106,79,.10),rgba(90,154,122,.08));
  border:1px solid rgba(45,106,79,.25);border-radius:100px;padding:5px 18px;
  font-size:12px;color:var(--green-l);letter-spacing:.10em;text-transform:uppercase;
  margin-bottom:14px;font-weight:700;box-shadow:0 2px 12px rgba(45,106,79,.08)}
.hero-eyebrow .dot{width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,#2d6a4f,#5a9a7a);
  animation:pulse 2s ease-in-out infinite;box-shadow:0 0 8px rgba(45,106,79,.4)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}

.hero-date{font-size:clamp(13px,2vw,15px);color:var(--t3);margin-bottom:10px;letter-spacing:.06em;font-weight:500}
.hero-title{font-size:clamp(32px,6vw,56px);font-weight:900;line-height:1.05;letter-spacing:-.03em;margin-bottom:8px;
  background:linear-gradient(135deg,#1a3a2a 0%,#2d6a4f 35%,#b85c3a 65%,#d4a574 85%,#1a3a2a 100%);
  background-size:200% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:title-shimmer 6s ease-in-out infinite}
@keyframes title-shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.hero-subtitle{font-size:clamp(13px,2.2vw,17px);color:var(--t2);margin-bottom:28px;font-weight:500}

.hero-qr-row{display:flex;align-items:center;justify-content:center;gap:24px;
  margin-top:28px;padding:20px 24px;max-width:520px;margin-left:auto;margin-right:auto;
  background:linear-gradient(135deg,rgba(255,255,255,.7),rgba(245,240,232,.6));
  border:1.5px solid rgba(26,58,42,.12);border-radius:16px;box-shadow:0 4px 20px rgba(26,58,42,.06)}
.qr-box{width:90px;height:90px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#f5f0e8,#ede5d5);
  border:2px dashed var(--t3);display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:var(--t3);font-size:10px;gap:3px}
.qr-box svg{width:32px;height:32px;opacity:.35}
.qr-info{text-align:left;font-size:12px;color:var(--t2);line-height:1.75}
.qr-info strong{color:var(--t1);font-weight:700;display:block;margin-bottom:2px}

.hero-stats{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:8px;border-radius:100px;padding:8px 18px;
  font-size:13px;color:var(--t1);transition:all .25s;cursor:default;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.stat-pill:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.10)}
.stat-pill .count{font-size:19px;font-weight:800;font-family:var(--fm);
  background:linear-gradient(135deg,#2d6a4f,#5a9a7a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-pill .label{color:var(--t2);font-size:12px;font-weight:600}
.stat-total{background:linear-gradient(135deg,#1a3a2a,#2d6a4f);
  border:2px solid rgba(45,106,79,.35);color:#fff;box-shadow:0 4px 20px rgba(26,58,42,.18)}
.stat-total .count{background:linear-gradient(135deg,#5a9a7a,#d4a574,#c8a96e);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-total .label{color:rgba(255,255,255,.75)}
.stat-model{background:linear-gradient(135deg,rgba(45,106,79,.12),rgba(90,154,122,.08));border:1.5px solid rgba(45,106,79,.25)}
.stat-product{background:linear-gradient(135deg,rgba(184,92,58,.12),rgba(212,165,116,.08));border:1.5px solid rgba(184,92,58,.25)}
.stat-industry{background:linear-gradient(135deg,rgba(45,106,79,.10),rgba(184,92,58,.08));border:1.5px solid rgba(45,106,79,.20)}
.stat-paper{background:linear-gradient(135deg,rgba(90,154,122,.12),rgba(200,169,110,.08));border:1.5px solid rgba(90,154,122,.25)}
.stat-tip{background:linear-gradient(135deg,rgba(200,169,110,.15),rgba(212,165,116,.08));border:1.5px solid rgba(200,169,110,.30)}

.gradient-line{height:2px;background:linear-gradient(90deg,#2d6a4f 0%,#5a9a7a 25%,#b85c3a 50%,#d4a574 75%,#2d6a4f 100%);margin:0}

.nav-bar{position:sticky;top:0;z-index:100;background:rgba(250,246,240,.94);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1.5px solid var(--br);padding:0 24px;overflow-x:auto;scrollbar-width:none;box-shadow:0 2px 16px rgba(26,58,42,.06)}
.nav-bar::-webkit-scrollbar{display:none}
.nav-inner{display:flex;gap:5px;padding:11px 0;white-space:nowrap;max-width:1200px;margin:0 auto}
.nav-item{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:9px;border:1.5px solid transparent;
  font-size:13px;color:var(--t2);text-decoration:none;transition:all .2s;cursor:pointer;white-space:nowrap;background:none;font-weight:500}
.nav-item:hover{color:var(--green);background:rgba(45,106,79,.08);border-color:rgba(45,106,79,.18);box-shadow:0 2px 10px rgba(45,106,79,.06)}
.nav-item.active{color:#fff;background:linear-gradient(135deg,#2d6a4f,#5a9a7a);border-color:rgba(45,106,79,.4);font-weight:700;box-shadow:0 3px 14px rgba(45,106,79,.25)}
.nav-item .nav-icon{font-size:15px}
.nav-item .nav-cnt{background:rgba(45,106,79,.12);color:var(--green-l);border-radius:100px;padding:1px 8px;font-size:11px;font-weight:700;font-family:var(--fm)}
.nav-item.active .nav-cnt{background:rgba(255,255,255,.25);color:#fff}

.main{max-width:1200px;margin:0 auto;padding:40px 24px 72px}

.section{margin-bottom:56px;opacity:0;transform:translateY(28px);transition:opacity .55s,transform .55s}
.section.visible{opacity:1;transform:translateY(0)}
.section-header{display:flex;align-items:center;gap:15px;margin-bottom:24px;padding-bottom:16px;border-bottom:1.5px solid var(--br)}
.section-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;box-shadow:0 3px 14px rgba(0,0,0,.08)}
.icon-model{background:linear-gradient(135deg,#1a3a2a,#2d6a4f);border:1.5px solid rgba(45,106,79,.30);color:#fff}
.icon-product{background:linear-gradient(135deg,#b85c3a,#d4a574);border:1.5px solid rgba(184,92,58,.30);color:#fff}
.icon-industry{background:linear-gradient(135deg,#2d6a4f,#b85c3a);border:1.5px solid rgba(45,106,79,.25);color:#fff}
.icon-paper{background:linear-gradient(135deg,#1a3a2a,#5a9a7a);border:1.5px solid rgba(45,106,79,.28);color:#fff}
.icon-tip{background:linear-gradient(135deg,#c8a96e,#b85c3a);border:1.5px solid rgba(200,169,110,.35);color:#fff}
.section-title-wrap{flex:1}
.section-title{font-size:clamp(18px,3vw,22px);font-weight:800;color:var(--t1);letter-spacing:-.015em;display:inline-flex;align-items:center;gap:10px}
.section-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 12px;border-radius:100px;font-size:11px;font-weight:700;font-family:var(--fm);margin-left:10px;vertical-align:middle;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.badge-model{background:linear-gradient(135deg,rgba(45,106,79,.14),rgba(90,154,122,.10));color:#2d6a4f;border:1.5px solid rgba(45,106,79,.28)}
.badge-product{background:linear-gradient(135deg,rgba(184,92,58,.14),rgba(212,165,116,.10));color:#b85c3a;border:1.5px solid rgba(184,92,58,.28)}
.badge-industry{background:linear-gradient(135deg,rgba(45,106,79,.10),rgba(184,92,58,.08));color:#2d6a4f;border:1.5px solid rgba(45,106,79,.22)}
.badge-paper{background:linear-gradient(135deg,rgba(90,154,122,.14),rgba(200,169,110,.10));color:#2d6a4f;border:1.5px solid rgba(90,154,122,.28)}
.badge-tip{background:linear-gradient(135deg,rgba(200,169,110,.16),rgba(184,92,58,.10));color:#b85c3a;border:1.5px solid rgba(200,169,110,.32)}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
@media(max-width:640px){.card-grid{grid-template-columns:1fr}}

.card{background:var(--card);border:1.5px solid var(--br);border-radius:var(--rc);padding:20px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--sd);transition:all .25s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;opacity:0;transition:opacity .25s;border-radius:3px 3px 0 0}
.card:hover{border-color:var(--br-g);box-shadow:var(--sdh);transform:translateY(-3px);background:var(--card-h)}
.card:hover::before{opacity:1}
.card-model::before{background:linear-gradient(90deg,#1a3a2a,#2d6a4f,#5a9a7a)}
.card-product::before{background:linear-gradient(90deg,#b85c3a,#d4a574,#c8a96e)}
.card-industry::before{background:linear-gradient(90deg,#2d6a4f,#b85c3a,#d4a574)}
.card-paper::before{background:linear-gradient(90deg,#1a3a2a,#5a9a7a,#c8a96e)}
.card-tip::before{background:linear-gradient(90deg,#c8a96e,#b85c3a,#d4a574)}

.card-top{display:flex;align-items:flex-start;gap:10px;justify-content:space-between}
.card-num{font-family:var(--fm);font-size:11px;font-weight:700;color:var(--t3);background:rgba(0,0,0,.03);border-radius:6px;padding:2px 8px;flex-shrink:0;margin-top:2px;border:1px solid rgba(0,0,0,.05)}
.card-source{display:inline-flex;align-items:center;gap:5px;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:600;flex-shrink:0;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.chip-model{background:rgba(45,106,79,.09);color:#2d6a4f;border:1.2px solid rgba(45,106,79,.20)}
.chip-product{background:rgba(184,92,58,.09);color:#b85c3a;border:1.2px solid rgba(184,92,58,.20)}
.chip-industry{background:rgba(45,106,79,.07);color:#2d6a4f;border:1.2px solid rgba(45,106,79,.18)}
.chip-paper{background:rgba(90,154,122,.09);color:#2d6a4f;border:1.2px solid rgba(90,154,122,.20)}
.chip-tip{background:rgba(200,169,110,.11);color:#b85c3a;border:1.2px solid rgba(200,169,110,.25)}

.card-title{font-size:15px;font-weight:700;color:var(--t1);line-height:1.45;letter-spacing:-.01em}
.card-summary{font-size:13px;line-height:1.75;color:var(--t2);flex:1;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:flex-end;padding-top:10px;border-top:1px solid rgba(0,0,0,.06)}

.btn-read{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-size:12px;font-weight:700;text-decoration:none;transition:all .2s;border:1.5px solid;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.btn-model{color:#2d6a4f;border-color:rgba(45,106,79,.30);background:linear-gradient(135deg,rgba(45,106,79,.08),rgba(90,154,122,.04))}
.btn-model:hover{background:linear-gradient(135deg,rgba(45,106,79,.18),rgba(90,154,122,.10));border-color:rgba(45,106,79,.50);color:#1a3a2a}
.btn-product{color:#b85c3a;border-color:rgba(184,92,58,.30);background:linear-gradient(135deg,rgba(184,92,58,.08),rgba(212,165,116,.04))}
.btn-product:hover{background:linear-gradient(135deg,rgba(184,92,58,.18),rgba(212,165,116,.10));border-color:rgba(184,92,58,.50);color:#8a4020}
.btn-industry{color:#2d6a4f;border-color:rgba(45,106,79,.28);background:linear-gradient(135deg,rgba(45,106,79,.07),rgba(184,92,58,.04))}
.btn-industry:hover{background:linear-gradient(135deg,rgba(45,106,79,.16),rgba(184,92,58,.09));border-color:rgba(45,106,79,.45);color:#1a3a2a}
.btn-paper{color:#2d6a4f;border-color:rgba(90,154,122,.28);background:linear-gradient(135deg,rgba(90,154,122,.07),rgba(200,169,110,.04))}
.btn-paper:hover{background:linear-gradient(135deg,rgba(90,154,122,.16),rgba(200,169,110,.09));border-color:rgba(90,154,122,.45);color:#1a3a2a}
.btn-tip{color:#b85c3a;border-color:rgba(200,169,110,.30);background:linear-gradient(135deg,rgba(200,169,110,.09),rgba(184,92,58,.05))}
.btn-tip:hover{background:linear-gradient(135deg,rgba(200,169,110,.18),rgba(184,92,58,.10));border-color:rgba(200,169,110,.50);color:#8a4020}

.footer{text-align:center;padding:28px 24px 36px;border-top:2px solid var(--br);background:linear-gradient(180deg,var(--paper) 0%,rgba(232,223,200,.4) 100%)}
.footer-meta{color:var(--t3);font-size:12px;line-height:2.1}
.footer-meta strong{color:var(--t2);font-weight:700}
.footer-disclaimer{margin-top:6px;color:var(--t3);font-size:11px;opacity:.65}

.back-top{position:fixed;bottom:28px;right:28px;width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#2d6a4f,#5a9a7a);border:1.5px solid rgba(45,106,79,.40);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:translateY(12px);transition:all .28s;color:#fff;font-size:18px;z-index:200;text-decoration:none;box-shadow:0 4px 18px rgba(45,106,79,.22)}
.back-top.show{opacity:1;transform:translateY(0)}
.back-top:hover{background:linear-gradient(135deg,#1a3a2a,#2d6a4f);border-color:rgba(45,106,79,.60);box-shadow:0 6px 24px rgba(45,106,79,.33)}

.top-line{position:fixed;top:0;left:0;right:0;height:3px;z-index:300;background:linear-gradient(90deg,#1a3a2a,#2d6a4f,#b85c3a,#d4a574,#c8a96e,#2d6a4f);background-size:300% 100%;animation:topline 5s ease-in-out infinite}
@keyframes topline{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

@media(max-width:768px){
  .hero{padding:44px 16px 36px}.main{padding:24px 16px 52px}
  .hero-stats{gap:8px}.stat-pill{padding:7px 14px;font-size:12px}.stat-pill .count{font-size:17px}
  .card-grid{gap:14px}
  .hero-qr-row{flex-direction:column;max-width:280px;gap:14px;padding:16px}
}

</style>
</head>
<body>
<div class="top-line"></div>
<header class="hero" id="top">
<div class="brand-top">
  <div class="brand-capsule">
    <span class="brand-icon">源</span>
    <span class="brand-name">源説研究社</span>
  </div>
  <div class="brand-slogan">溯源派·景观 AI 赋能者</div>
</div>
<div class="hero-date">2026-07-15 &middot; 星期三 &middot; 北京时间</div>
<h1 class="hero-title">景观行业 AI 日报</h1>
<p class="hero-subtitle">景观设计 &middot; 人工智能 &middot; 每日精选前沿动态</p>
<div class="hero-stats" id="heroStats"></div>

const CFG = {
  'AI工具/模型更新': {k:'model',i:'🤖'},
  '行业应用案例': {k:'product',i:'🏗️'},
  '学术前沿':       {k:'paper',i:'📄'},
  '实战技巧':       {k:'tip',i:'💡'},
  '行业观察':       {k:'industry',i:'🌐'},
};

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function trunc(s,n){ s=(s||'').trim(); return s.length<=n?s:s.slice(0,n-1)+String.fromCharCode(8230); }

function render(){
  const d=DAILY_DATA, secs=d.sections;
  let total=0; secs.forEach(function(s){ total+=s.items.length; });

  let sh='<div class="stat-pill stat-total"><span class="count">'+total+'</span><span class="label">条精选</span></div>';
  secs.forEach(function(s){
    const c=CFG[s.label]||{k:'model',i:'📋'};
    sh+='<div class="stat-pill stat-'+c.k+'"><span>'+c.i+'</span><span class="count">'+s.items.length+'</span><span class="label">'+esc(s.label)+'</span></div>';
  });
  document.getElementById('heroStats').innerHTML=sh;

  let nh='<a class="nav-item" href="#top"><span class="nav-icon">&#9728;</span>日报首页</a>';
  secs.forEach(function(s){
    const c=CFG[s.label]||{k:'model',i:'📋'};
    nh+='<a class="nav-item" href="#section-'+c.k+'"><span class="nav-icon">'+c.i+'</span>'+esc(s.label)+'<span class="nav-cnt">'+s.items.length+'</span></a>';
  });
  document.getElementById('navInner').innerHTML=nh;

  let gn=0, mh='';
  secs.forEach(function(s){
    const c=CFG[s.label]||{k:'model',i:'📋'};
    let ch='';
    s.items.forEach(function(it){
      gn++;
      ch+='<div class="card card-'+c.k+'">'
        +'<div class="card-top"><span class="card-num">#'+String(gn).padStart(2,'0')+'</span>'
        +'<span class="card-source chip-'+c.k+'" title="'+esc(it.sourceName||'未知来源')+'">'+esc(it.sourceName||'未知来源')+'</span></div>'
        +'<div class="card-title">'+esc(it.title)+'</div>'
        +'<div class="card-summary">'+esc(trunc(it.summary,120))+'</div>'
        +'<div class="card-footer"><a class="btn-read btn-'+c.k+'" href="'+esc(it.sourceUrl||'#')+'" target="_blank" rel="noopener noreferrer">阅读原文 &#10132;</a></div>'
        +'</div>';
    });
    mh+='<section class="section" id="section-'+c.k+'">'
      +'<div class="section-header"><div class="section-icon icon-'+c.k+'">'+c.i+'</div>'
      +'<div class="section-title-wrap"><h2 class="section-title">'+esc(s.label)
      +'<span class="section-badge badge-'+c.k+'">'+s.items.length+' 条</span></h2></div></div>'
      +'<div class="card-grid">'+ch+'</div></section>';
  });
  document.getElementById('mainContent').innerHTML=mh;
}

function initSA(){
  var ss=document.querySelectorAll('.section');
  var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);}});},{threshold:.06,rootMargin:'0px 0px -40px 0px'});
  ss.forEach(function(s,i){s.style.transitionDelay=(i*.05)+'s';io.observe(s);});
}
function initNA(){
  var se=document.querySelectorAll('section.section');
  var ni=document.querySelectorAll('.nav-item');
  var io2=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){var id=e.target.id;ni.forEach(function(n){n.classList.toggle('active',n.getAttribute('href')==='#'+id);});}});},{threshold:.3});
  se.forEach(function(s){io2.observe(s);});
}
function initBT(){
  var b=document.getElementById('backTop');
  window.addEventListener('scroll',function(){b.classList.toggle('show',window.scrollY>400);},{passive:true});
}

document.addEventListener('DOMContentLoaded',function(){render();initSA();initNA();initBT();});

</script>
